server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS embebido de Docker — resuelve "backend" en tiempo de request (ver
    # nota abajo), no al arrancar nginx.
    resolver 127.0.0.11 valid=10s;

    # Proxy API calls al backend — solo aplica cuando frontend+backend
    # comparten red de Docker (docker-compose local). En Railway, con
    # servicios separados, el frontend pega directo al backend vía
    # VITE_API_URL incrustado en build time (ver src/api/client.ts), así que
    # nadie pega acá en ese caso. "backend" en un $var (no en proxy_pass
    # directo) es a propósito: si el host no existe, nginx igual arranca bien
    # y solo esta ruta puntual devuelve 502 — sin la variable, nginx se
    # niega a arrancar el proceso ENTERO por no poder resolver "backend" al
    # leer el config, tumbando el contenedor completo (pasó al probarlo
    # standalone, sin red de compose).
    location /api/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Healthcheck para Railway — respuesta liviana sin tocar el proxy de arriba
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # SPA fallback — redirige todo al index.html para que React Router maneje las rutas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
